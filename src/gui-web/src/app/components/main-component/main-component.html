@if(!userService.isReady()) {
<mat-progress-spinner mode="indeterminate"/>
} @else {

<button mat-raised-button color="primary" (click)="onTest()">@if (!userService.user()) { Login } @else { Logout }</button>
@if(!userService.user()) { <br/><mat-checkbox [(ngModel)]="persistentLogin">Stay logged in</mat-checkbox> }
<router-outlet />

}

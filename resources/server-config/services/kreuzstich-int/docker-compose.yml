networks:
  kreuzstich-int-backend:
    internal: true
  kreuzstich-int:
    internal: true

services:
  kreuzstich-int-database:
    container_name: kreuzstich-int-database
    image: postgres:18
    environment:
      - POSTGRES_USER=kreuzstich
      - POSTGRES_PASSWORD=kreuzstich
      - POSTGRES_DB=kreuzstich
    networks:
      - kreuzstich-int-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./database:/var/lib/postgresql
    restart: always

  kreuzstich-int-api:
    container_name: kreuzstich-int-api
    depends_on:
      - kreuzstich-int-database
    image: ghcr.io/polletfa/kreuzstich-int-api:latest
    env_file:
      # For environment variables that should not be committed:
      # - KREUZSTICH_DATA_WEB_JWT_SECRET
      - ./secrets.env
    environment:
      - KREUZSTICH_DATA_WEB_LOGDIR=/var/log/kreuzstich/
      - KREUZSTICH_DATA_WEB_PORT=80
      - KREUZSTICH_DATA_WEB_DB_HOST=kreuzstich-int-database
      - KREUZSTICH_DATA_WEB_DB_DB=kreuzstich
      - KREUZSTICH_DATA_WEB_DB_USER=kreuzstich
      - KREUZSTICH_DATA_WEB_DB_PASSWORD=kreuzstich
    networks:
        - kreuzstich-int-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./logs/api:/var/log/kreuzstich/
    restart: always

  kreuzstich-int:
    container_name: kreuzstich-int
    depends_on:
      - kreuzstich-int-api
    image: ghcr.io/polletfa/kreuzstich-int:latest
    networks:
      - kreuzstich-int
      - kreuzstich-int-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./logs/nginx:/var/log/nginx
    restart: always

networks:
  kreuzstich-int-backend:
    internal: true
  kreuzstich-int:
    internal: true

services:
  kreuzstich-int-database:
    container_name: kreuzstich-int-database
    image: postgres:18
    environment:
      - POSTGRES_USER=kreuzstich
      - POSTGRES_PASSWORD=kreuzstich
      - POSTGRES_DB=kreuzstich
    networks:
      - kreuzstich-int-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./database:/var/lib/postgresql/data
    restart: always

  kreuzstich-int-api:
    container_name: kreuzstich-int-api
    depends_on:
      - kreuzstich-int-database
    image: kreuzstich-int
    build:
      dockerfile_inline: |
        FROM node:22.22.2-alpine3.23
        WORKDIR /usr/share/kreuzstich
        CMD ["node", "index.js"]
    environment:
      - KREUZSTICH_DATA_WEB_LOGDIR=/var/log/kreuzstich/
      - KREUZSTICH_DATA_WEB_PORT=80
      - KREUZSTICH_DATA_WEB_DB_HOST=kreuzstich-int-database
      - KREUZSTICH_DATA_WEB_DB_DB=kreuzstich
      - KREUZSTICH_DATA_WEB_DB_USER=kreuzstich
      - KREUZSTICH_DATA_WEB_DB_PASSWORD=kreuzstich
    networks:
        - kreuzstich-int-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./data/backend:/usr/share/kreuzstich/
      - ./logs/api:/var/log/kreuzstich/
    restart: always

  kreuzstich:
    container_name: kreuzstich-int
    depends_on:
      - kreuzstich-int-api
    image: nginx:1.29.3
    networks:
      - kreuzstich-int
      - kreuzstich-int-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./data/frontend:/usr/share/nginx/html
      - ./logs/nginx:/var/log/nginx
    restart: always

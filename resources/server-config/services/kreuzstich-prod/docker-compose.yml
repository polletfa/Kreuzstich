networks:
  kreuzstich-prod-backend:
    internal: true
  kreuzstich-prod:
    internal: true

services:
  kreuzstich-prod-database:
    container_name: kreuzstich-prod-database
    image: postgres:18
    environment:
      - POSTGRES_USER=kreuzstich
      - POSTGRES_PASSWORD=kreuzstich
      - POSTGRES_DB=kreuzstich
    networks:
      - kreuzstich-prod-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./database:/var/lib/postgresql/data
    restart: always

  kreuzstich-prod-api:
    container_name: kreuzstich-prod-api
    depends_on:
      - kreuzstich-prod-database
    image: ghcr.io/polletfa/kreuzstich-prod-api:latest
    environment:
      - KREUZSTICH_DATA_WEB_LOGDIR=/var/log/kreuzstich/
      - KREUZSTICH_DATA_WEB_PORT=80
      - KREUZSTICH_DATA_WEB_DB_HOST=kreuzstich-prod-database
      - KREUZSTICH_DATA_WEB_DB_DB=kreuzstich
      - KREUZSTICH_DATA_WEB_DB_USER=kreuzstich
      - KREUZSTICH_DATA_WEB_DB_PASSWORD=kreuzstich
    networks:
        - kreuzstich-prod-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./logs/api:/var/log/kreuzstich/
    restart: always

  kreuzstich-prod:
    container_name: kreuzstich-prod
    depends_on:
      - kreuzstich-prod-api
    image: ghcr.io/polletfa/kreuzstich-prod:latest
    networks:
      - kreuzstich-prod
      - kreuzstich-prod-backend
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

      - ./logs/nginx:/var/log/nginx
    restart: always

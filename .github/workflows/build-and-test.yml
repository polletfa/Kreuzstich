name: Build and Test (multiple platforms)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MVSC
            build_type: Release
            os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            qt_arch: win64_msvc2022_64
            qt_host: windows
          - name: Linux GCC
            build_type: Release
            os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            qt_arch: linux_gcc_64
            qt_host: linux
          - name: Linux Clang
            build_type: Release
            os: ubuntu-latest
            c_compiler: clang-19
            cpp_compiler: clang++-19
            qt_arch: linux_gcc_64
            qt_host: linux
          - name: MacOS Clang
            build_type: Release
            os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            qt_arch: clang_64
            qt_host: mac

    steps:
    - name: Install Clang 19
      if: matrix.c_compiler == 'clang-19' && matrix.os == 'ubuntu-latest'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 19

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.2'
        host: ${{ matrix.qt_host }}
        target: 'desktop'
        arch: ${{ matrix.qt_arch }}
        cache: true

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - uses: actions/checkout@v6

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} runtests

  all-checks-passed:
    needs: [build]  # your matrix job name
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
          exit 1
          fi
